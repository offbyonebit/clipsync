name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        # Only install what the tests actually touch. Pulling the full
        # requirements.txt would drag in opencv-python and customtkinter,
        # which are not needed for clipboard/settings coverage and slow
        # CI down significantly.
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyperclip watchdog cryptography

      - name: Run tests
        run: python -m pytest tests/ -v
