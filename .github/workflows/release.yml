name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required when run manually."
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, macos]
            artifact_name: ClipSync-macos-arm64
            artifact_path: dist/ClipSync.app
            archive: zip
          - runner: windows-latest
            artifact_name: ClipSync-windows-x86_64
            artifact_path: dist/ClipSync
            archive: zip
          - runner: ubuntu-latest
            artifact_name: ClipSync-linux-x86_64
            artifact_path: dist/clipsync
            archive: tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-tk libgl1 libglib2.0-0 xclip \
            gir1.2-ayatanaappindicator3-0.1 python3-gi

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build
        run: python -m clipsync.build

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../${{ matrix.artifact_name }}.zip ClipSync.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ClipSync -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf ../${{ matrix.artifact_name }}.tar.gz clipsync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.zip
            ${{ matrix.artifact_name }}.tar.gz
          if-no-files-found: ignore

  release:
    name: Attach artifacts to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: artifacts/**/*
